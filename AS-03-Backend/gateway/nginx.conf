worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/json;

    # Lua setup
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    # Docker DNS
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # Shared dictionaries
    lua_shared_dict jwks_cache 10m;
    lua_shared_dict rate_limit_store 20m;

    # ==========================
    # UPSTREAM SERVICES
    # ==========================
    upstream backend_service {
        server backend:8000;
    }

    upstream keycloak_service {
        server keycloak:8080;
    }

    server {
        listen 80;

        # ==========================
        # CORS
        # ==========================
        set $cors_origin "";
        set $cors_methods "GET, POST, PUT, DELETE, OPTIONS";
        set $cors_headers "Authorization, Content-Type, Accept";

        if ($http_origin ~* "^http://localhost:(5173|5174|3000|8080)$") {
            set $cors_origin $http_origin;
        }

        if ($http_origin ~* "^http://18.214.226.2(:[0-9]+)?$") {
            set $cors_origin $http_origin;
        }

        # ==========================
        # BACKEND ADMIN API ROUTES
        # (must be before /admin/ keycloak block)
        # ==========================
        location = /admin/users {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods $cors_methods;
                add_header Access-Control-Allow-Headers $cors_headers;
                add_header Access-Control-Allow-Credentials true;
                return 204;
            }
            access_by_lua_file /usr/local/openresty/nginx/lua/jwt_validator.lua;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            proxy_pass http://backend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /admin/users/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods $cors_methods;
                add_header Access-Control-Allow-Headers $cors_headers;
                add_header Access-Control-Allow-Credentials true;
                return 204;
            }
            access_by_lua_file /usr/local/openresty/nginx/lua/jwt_validator.lua;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            proxy_pass http://backend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /admin/bulk-users {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods $cors_methods;
                add_header Access-Control-Allow-Headers $cors_headers;
                add_header Access-Control-Allow-Credentials true;
                return 204;
            }
            access_by_lua_file /usr/local/openresty/nginx/lua/jwt_validator.lua;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            proxy_pass http://backend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================
        # KEYCLOAK ROUTES
        # ==========================
        location /realms/ {
            proxy_pass http://keycloak_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            proxy_pass http://keycloak_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /resources/ {
            proxy_pass http://keycloak_service;
        }

        # ==========================
        # AUTH ROUTES (NO JWT)
        # ==========================
        location ~ ^/(login|logout|callback|refresh) {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods $cors_methods;
                add_header Access-Control-Allow-Headers $cors_headers;
                add_header Access-Control-Allow-Credentials true;
                return 204;
            }
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            proxy_set_header Cookie $http_cookie;
            proxy_pass http://backend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Set-Cookie;
        }

        # ==========================
        # HEALTH CHECK
        # ==========================
        location /health {
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://backend_service/health;
        }

        # ==========================
        # PROTECTED ROUTES
        # ==========================
        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods $cors_methods;
                add_header Access-Control-Allow-Headers $cors_headers;
                add_header Access-Control-Allow-Credentials true;
                return 204;
            }
            access_by_lua_file /usr/local/openresty/nginx/lua/jwt_validator.lua;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            proxy_pass http://backend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}