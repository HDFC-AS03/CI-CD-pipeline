events {}

http {

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

   # Shared dict for JWKS caching
    lua_shared_dict jwks_cache 1m;

    # Shared dict for rate limiting
    lua_shared_dict rate_limit_store 20m;

    # # ==========================
    # # RATE LIMIT CONFIGURATION
    # # ==========================

    # # Limit requests per IP
    # limit_req_zone $binary_remote_addr zone=ip_limit:10m rate=20r/s;

    # # Limit requests per authenticated user
    # limit_req_zone $http_x_user_id zone=user_limit:10m rate=10r/s;

    # ==========================
    # BACKEND SERVICE
    # ==========================

    upstream backend_service {
        server backend:8000;
    }

    server {

        listen 80;

        # ==========================
        # CORS CONFIGURATION
        # ==========================

        set $cors_origin "";
        set $cors_methods "GET, POST, PUT, DELETE, OPTIONS";
        set $cors_headers "Authorization, Content-Type, Accept";

        if ($http_origin ~* "^http://localhost:(5173|5174|3000|8080)$") {
            set $cors_origin $http_origin;
        }

        if ($http_origin = "http://localhost") {
            set $cors_origin $http_origin;
        }

        # ==========================
        # AUTH ROUTES (NO JWT CHECK)
        # ==========================

        location ~ ^/(login|logout|callback|refresh) {

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin;
                add_header 'Access-Control-Allow-Methods' $cors_methods;
                add_header 'Access-Control-Allow-Headers' $cors_headers;
                add_header 'Access-Control-Allow-Credentials' 'true';
                add_header 'Access-Control-Max-Age' 86400;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            proxy_set_header Cookie $http_cookie;

            proxy_pass http://backend_service;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            

            proxy_pass_header Set-Cookie;
        }

        # ==========================
        # HEALTH CHECK
        # ==========================

        location /health {

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin;
                add_header 'Access-Control-Allow-Methods' $cors_methods;
                add_header 'Access-Control-Allow-Headers' $cors_headers;
                add_header 'Access-Control-Allow-Credentials' 'true';
                add_header 'Access-Control-Max-Age' 86400;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            proxy_pass http://backend_service/health;
        }

        # ==========================
        # PROTECTED API ROUTES
        # ==========================

        location / {

            # Handle CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin;
                add_header 'Access-Control-Allow-Methods' $cors_methods;
                add_header 'Access-Control-Allow-Headers' $cors_headers;
                add_header 'Access-Control-Allow-Credentials' 'true';
                add_header 'Access-Control-Max-Age' 86400;
                return 204;
            }

            # ======================
            # RATE LIMITING
            # ======================

            # limit_req zone=ip_limit burst=40 nodelay;
            # limit_req zone=user_limit burst=20 nodelay;

            # ======================
            # JWT VALIDATION
            # ======================

            access_by_lua_file /usr/local/openresty/nginx/lua/jwt_validator.lua;

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            # ======================
            # FORWARD REQUEST
            # ======================

            proxy_pass http://backend_service;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # proxy_set_header x-user-id $upstream_http_x_user_id;
            # proxy_set_header x-user-email $upstream_http_x_user_email;
            # proxy_set_header x-user-name $upstream_http_x_user_name;
            # proxy_set_header x-user-roles $upstream_http_x_user_roles;
        }

        # ==========================
        # RATE LIMIT ERROR RESPONSE
        # ==========================

        # error_page 429 = /rate_limit_exceeded;

        # location = /rate_limit_exceeded {
        #     default_type application/json;
        #     return 429 '{"error":"Too many requests"}';
        # }
    }
}