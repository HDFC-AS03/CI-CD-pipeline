name: Project CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Build the Backend (FastAPI)
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./AS-03-Backend # This fixes the 'No such file' error
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build Docker Image
        run: docker build -t as03-backend:latest .

  # Job 2: Build the Frontend (React)
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./AS-03-Frontend # This ensures npm finds package.json
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Build
        run: |
          npm install
          npm run build
      - name: Build Docker Image
        run: docker build -t as03-frontend:latest .