# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────
  # 1. FRONTEND
  # ─────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AS-03-Frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: AS-03-Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: AS-03-Frontend/dist
          retention-days: 1

  # ─────────────────────────────────────────
  # 2. BACKEND
  # ─────────────────────────────────────────
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AS-03-Backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: AS-03-Backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Unit tests
        run: pytest tests/unit -v --tb=short

  # ─────────────────────────────────────────
  # 3. INTEGRATION TESTS
  # ─────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppass
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      keycloak:
        image: quay.io/keycloak/keycloak:24.0
        env:
          KEYCLOAK_ADMIN: admin
          KEYCLOAK_ADMIN_PASSWORD: admin
          KC_DB: dev-mem
        ports:
          - 8080:8080
        options: >-
          --health-cmd "curl -sf http://localhost:8080/health/ready || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://appuser:apppass@localhost:5432/appdb
      KEYCLOAK_URL: http://localhost:8080
      KEYCLOAK_REALM: myrealm
      KEYCLOAK_CLIENT_ID: myapp
      SECRET_KEY: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: AS-03-Backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r AS-03-Backend/requirements.txt

      - name: Wait for Keycloak
        run: |
          echo "Waiting for Keycloak..."
          for i in {1..30}; do
            curl -sf http://localhost:8080/health/ready && break
            sleep 5
          done

      - name: Run DB migrations
        working-directory: AS-03-Backend
        run: alembic upgrade head

      - name: Integration tests
        working-directory: AS-03-Backend
        run: pytest tests/integration -v --tb=short

  # ─────────────────────────────────────────
  # 4. DOCKER BUILD & PUSH
  # ─────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [integration]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: AS-03-Frontend/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./AS-03-Frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./AS-03-Backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test backend
        run: |
          docker run -d --name backend \
            -e DATABASE_URL=sqlite:///./test.db \
            -e KEYCLOAK_URL=http://mock \
            -p 8000:8000 \
            ghcr.io/${{ github.repository }}/backend:sha-${{ github.sha }}
          sleep 5
          curl -sf http://localhost:8000/health || (docker logs backend && exit 1)
          docker stop backend