name: Project CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # Job 1: Build Backend
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./AS-03-Backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      - name: Build Docker Image
        run: docker build -t as03-backend:latest .

  # Job 2: Build Frontend
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./AS-03-Frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Build
        run: |
          npm install
          npm run build
      - name: Build Docker Image
        run: docker build -t as03-frontend:latest .