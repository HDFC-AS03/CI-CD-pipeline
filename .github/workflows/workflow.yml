name: AS03 Full Stack CI/CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

# Prevent duplicate pipelines running at the same time
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:

  # ==========================================
  # BACKEND CI (FastAPI)
  # ==========================================
  backend:
    name: Backend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: AS-03-Backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          

      # Optional: Add tests later
      # - name: Run Tests
      #   run: pytest

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        run: docker build -t as03-backend:latest .



  # ==========================================
  # FRONTEND CI (React / Vite)
  # ==========================================
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: AS-03-Frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: AS-03-Frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build React App
        run: npm run build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Docker Image
        run: docker build -t as03-frontend:latest .



  # ==========================================
  # DEPLOY TO EC2
  # ==========================================
  deploy:
    name: Deploy to EC2
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    # Deploy only from main branch
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            echo "Starting deployment..."

            # 1. Check if directory exists; if not, clone it
            if [ ! -d "~/CI-CD-pipeline" ]; then
              echo "Directory not found. Cloning repository..."
              git clone https://github.com/HDFC-AS03/CI-CD-pipeline.git ~/CI-CD-pipeline
            fi

            # 2. Navigate to the project folder
            cd ~/CI-CD-pipeline

            # 3. Pull updates and restart services
            echo "Pulling latest code"
            git pull origin main

            echo "Restarting containers"
            # Using 'sudo' if your EC2 user isn't in the docker group
            docker compose down
            docker compose up -d --build

            echo "Cleaning old images"
            docker image prune -f

            echo "Deployment completed"